<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokenEx Whitelist Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .content { padding: 30px; }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        .status.info { background: #e3f2fd; color: #1565c0; }
        .status.success { background: #e8f5e9; color: #2e7d32; }
        .status.error { background: #ffebee; color: #c62828; }
        .status.warning { background: #fff3e0; color: #ef6c00; }
        .field-group {
            margin-bottom: 20px;
        }
        .field-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .field-container {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            min-height: 50px;
            transition: border-color 0.3s;
        }
        .field-container.focus { border-color: #667eea; }
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .logs {
            margin-top: 30px;
            background: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .logs h3 {
            margin-bottom: 10px;
            font-size: 14px;
            color: #666;
        }
        .log-entry {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin: 5px 0;
            padding: 5px;
            border-bottom: 1px solid #ddd;
        }
        .log-entry.success { color: #2e7d32; }
        .log-entry.error { color: #c62828; }
        .info-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .info-box strong { color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔒 TokenEx Whitelist Test</h1>
            <p>Testing TokenEx iframe on whitelisted domain</p>
        </div>

        <div class="content">
            <div class="info-box">
                <strong>Current URL:</strong> <span id="current-url"></span><br>
                <strong>TokenEx ID:</strong> 3787957743127376<br>
                <strong>Whitelisted:</strong> https://hppsbqucfklrrytfftye.supabase.co
            </div>

            <div id="status"></div>

            <div class="field-group">
                <label for="tokenex-card">Card Number</label>
                <div id="tokenex-card" class="field-container"></div>
            </div>

            <div class="field-group">
                <label for="tokenex-cvv">CVV</label>
                <div id="tokenex-cvv" class="field-container"></div>
            </div>

            <button id="test-btn" onclick="testTokenize()" disabled>Test Tokenization</button>

            <div class="logs">
                <h3>Event Log</h3>
                <div id="logs"></div>
            </div>
        </div>
    </div>

    <script src="https://us1-htp.tokenex.com/Iframe/Iframe-v3.min.js"></script>
    <script>
        let iframe = null;
        const logs = [];

        document.getElementById('current-url').textContent = window.location.origin;

        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            logs.push({ time, message, type });
            const logsDiv = document.getElementById('logs');
            logsDiv.innerHTML = logs.map(l =>
                `<div class="log-entry ${l.type}">[${l.time}] ${l.message}</div>`
            ).reverse().join('');
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status ' + type;
            statusDiv.innerHTML = message;
        }

        async function init() {
            log('🔄 Starting TokenEx initialization...');
            showStatus('⏳ Loading TokenEx...', 'info');

            if (typeof TokenEx === 'undefined') {
                log('⏳ Waiting for TokenEx library...', 'info');
                setTimeout(init, 500);
                return;
            }

            log('✅ TokenEx library loaded', 'success');

            try {
                const origin = window.location.origin;
                log(`📤 Requesting auth for: ${origin}`);

                const response = await fetch('https://hppsbqucfklrrytfftye.supabase.co/functions/v1/tokenex-auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwcHNicXVjZmtscnJ5dGZmdHllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMTIzNDMsImV4cCI6MjA4OTY4ODM0M30.e_XiXMdvIMyRX6noViWDUm9T7JTIhl0hRqpIsBVKKvk'
                    },
                    body: JSON.stringify({
                        tokenScheme: 'sixTOKENfour',
                        origin: origin
                    })
                });

                const authData = await response.json();

                if (!authData.success) {
                    log(`❌ Auth failed: ${authData.error}`, 'error');
                    showStatus('❌ Authentication failed', 'error');
                    return;
                }

                log('✅ Auth successful', 'success');
                log(`📋 TokenEx ID: ${authData.tokenExID}`);

                const config = {
                    tokenExID: authData.tokenExID,
                    tokenScheme: authData.tokenScheme,
                    authenticationKey: authData.authenticationKey,
                    timestamp: authData.timestamp,
                    origin: origin,
                    pci: true,
                    enableValidateOnBlur: true,
                    enablePrettyFormat: true,
                    inputType: 'text',
                    styles: {
                        base: 'font-family: system-ui; padding: 14px; font-size: 16px; color: #333;'
                    },
                    placeholder: '1234 5678 9012 3456',
                    cvv: true,
                    cvvContainerID: 'tokenex-cvv',
                    cvvPlaceholder: '123'
                };

                log('🔨 Creating TokenEx iframe...');
                iframe = new TokenEx.Iframe('tokenex-card', config);

                iframe.on('load', () => {
                    log('✅ TokenEx iframe loaded successfully!', 'success');
                    showStatus('✅ SUCCESS! Domain is whitelisted. TokenEx iframe loaded.', 'success');
                    document.getElementById('test-btn').disabled = false;
                });

                iframe.on('error', (error) => {
                    log(`❌ TokenEx error: ${JSON.stringify(error)}`, 'error');
                    showStatus(`❌ ERROR: ${error.message || 'Unknown error'}`, 'error');
                    alert('TokenEx Error:\n' + JSON.stringify(error, null, 2));
                });

                iframe.on('authenticationFailed', (error) => {
                    log(`❌ Authentication failed: ${JSON.stringify(error)}`, 'error');
                    showStatus('❌ AUTHENTICATION FAILED - Domain may not be whitelisted', 'error');
                    alert('TokenEx Authentication Failed:\n' + JSON.stringify(error, null, 2));
                });

                iframe.on('focus', () => {
                    document.querySelector('#tokenex-card').classList.add('focus');
                    log('🎯 Card field focused');
                });

                iframe.on('blur', () => {
                    document.querySelector('#tokenex-card').classList.remove('focus');
                    log('Card field blurred');
                });

                iframe.on('validate', (data) => {
                    log(`Validation: ${data.isValid ? '✅ Valid' : '❌ Invalid'}`);
                });

                log('📞 Calling iframe.load()...');
                iframe.load();

            } catch (error) {
                log(`❌ Exception: ${error.message}`, 'error');
                showStatus(`❌ Error: ${error.message}`, 'error');
            }
        }

        function testTokenize() {
            if (!iframe) {
                alert('Iframe not ready');
                return;
            }

            log('🔐 Testing tokenization...');
            showStatus('⏳ Tokenizing...', 'info');

            iframe.tokenize((result) => {
                if (result.error) {
                    log(`❌ Tokenize error: ${result.error}`, 'error');
                    showStatus(`❌ Tokenization failed: ${result.error}`, 'error');
                } else {
                    log(`✅ Token generated: ${result.token}`, 'success');
                    showStatus(`✅ Token: ${result.token}`, 'success');
                }
            });
        }

        window.addEventListener('load', () => {
            setTimeout(init, 100);
        });
    </script>
</body>
</html>
